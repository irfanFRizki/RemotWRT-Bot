<%+header%>

<div class="cbi-map">
    <h2 name="content">RemotWRT Dashboard</h2>
    <div class="cbi-map-descr">Real-time monitoring of connected devices and network statistics</div>
</div>

<fieldset class="cbi-section">
    <legend>Connected Devices</legend>
    <table class="cbi-section-table" id="devices-table">
        <tr class="cbi-section-table-titles">
            <th class="cbi-section-table-cell">IP Address</th>
            <th class="cbi-section-table-cell">MAC Address</th>
            <th class="cbi-section-table-cell">Status</th>
            <th class="cbi-section-table-cell">Source</th>
            <th class="cbi-section-table-cell">Actions</th>
        </tr>
        <tr class="cbi-section-table-row" id="loading-row">
            <td colspan="5" style="text-align:center;">Loading devices...</td>
        </tr>
    </table>
</fieldset>

<fieldset class="cbi-section">
    <legend>Network Statistics</legend>
    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <div class="cbi-value" style="flex: 1; min-width: 200px;">
            <label class="cbi-value-title">Total Devices</label>
            <div class="cbi-value-field" id="stat-total">-</div>
        </div>
        <div class="cbi-value" style="flex: 1; min-width: 200px;">
            <label class="cbi-value-title">Authenticated</label>
            <div class="cbi-value-field" id="stat-authenticated">-</div>
        </div>
        <div class="cbi-value" style="flex: 1; min-width: 200px;">
            <label class="cbi-value-title">Pending</label>
            <div class="cbi-value-field" id="stat-pending">-</div>
        </div>
        <div class="cbi-value" style="flex: 1; min-width: 200px;">
            <label class="cbi-value-title">Whitelisted</label>
            <div class="cbi-value-field" id="stat-whitelist">-</div>
        </div>
    </div>
</fieldset>

<fieldset class="cbi-section">
    <legend>Quick Actions</legend>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="cbi-button cbi-button-positive" onclick="refreshDevices()">Refresh</button>
        <button class="cbi-button cbi-button-action" onclick="generateVoucher()">Generate Voucher</button>
        <button class="cbi-button cbi-button-neutral" onclick="location.href='<%=url('admin/services/remotwrt/vouchers')%>'">Manage Vouchers</button>
        <button class="cbi-button cbi-button-neutral" onclick="location.href='<%=url('admin/services/remotwrt/firewall')%>'">Firewall Rules</button>
    </div>
</fieldset>

<script type="text/javascript">
    function refreshDevices() {
        XHR.get('<%=url('admin/services/remotwrt/api')%>', { action: 'get_devices' }, function(x, data) {
            var table = document.getElementById('devices-table');
            var total = 0;
            var authenticated = 0;
            var pending = 0;
            
            // Clear existing rows except header
            while (table.rows.length > 1) {
                table.deleteRow(1);
            }
            
            if (data && data.length > 0) {
                data.forEach(function(device) {
                    var row = table.insertRow(-1);
                    row.className = 'cbi-section-table-row';
                    
                    var cell_ip = row.insertCell(0);
                    cell_ip.textContent = device.ip || '-';
                    
                    var cell_mac = row.insertCell(1);
                    cell_mac.textContent = device.mac || '-';
                    
                    var cell_status = row.insertCell(2);
                    var status_badge = document.createElement('span');
                    status_badge.className = 'cbi-badge';
                    if (device.status === 'authenticated') {
                        status_badge.style.backgroundColor = '#28a745';
                        status_badge.textContent = 'Authenticated';
                        authenticated++;
                    } else {
                        status_badge.style.backgroundColor = '#ffc107';
                        status_badge.textContent = 'Pending';
                        pending++;
                    }
                    cell_status.appendChild(status_badge);
                    
                    var cell_source = row.insertCell(3);
                    cell_source.textContent = device.source || '-';
                    
                    var cell_actions = row.insertCell(4);
                    if (device.status !== 'authenticated') {
                        var btn_whitelist = document.createElement('button');
                        btn_whitelist.className = 'cbi-button cbi-button-positive';
                        btn_whitelist.textContent = 'Whitelist';
                        btn_whitelist.onclick = function() {
                            addFirewallRule('whitelist', device.mac, device.ip);
                        };
                        cell_actions.appendChild(btn_whitelist);
                    }
                    
                    total++;
                });
            } else {
                var row = table.insertRow(-1);
                row.className = 'cbi-section-table-row';
                var cell = row.insertCell(0);
                cell.colSpan = 5;
                cell.textContent = 'No devices connected';
                cell.style.textAlign = 'center';
            }
            
            // Update statistics
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-authenticated').textContent = authenticated;
            document.getElementById('stat-pending').textContent = pending;
            
            // Get whitelist count
            XHR.get('<%=url('cgi-bin/luci/admin/services/remotwrt/firewall')%>', null, function(x, html) {
                // Simple count from config would be better, but this works for now
                document.getElementById('stat-whitelist').textContent = '-';
            });
        });
    }
    
    function generateVoucher() {
        var category = prompt("Enter category (keluarga/pengguna_lain):", "keluarga");
        if (category) {
            var validity = prompt("Enter validity in minutes:", "60");
            if (validity) {
                var max_use = prompt("Enter max usage:", "1");
                if (max_use) {
                    // Get CSRF token from LuCI session
                    var token = document.getElementsByName('token')[0]?.value || '';
                    
                    XHR.post('<%=url('admin/services/remotwrt/api')%>', {
                        action: 'generate_voucher',
                        category: category,
                        validity: validity,
                        max_use: max_use,
                        token: token
                    }, function(x, data) {
                        if (data.success) {
                            alert("Voucher generated: " + data.code);
                        } else {
                            alert("Error: " + (data.error || "Unknown error"));
                        }
                    });
                }
            }
        }
    }
    
    function addFirewallRule(rule_type, mac, ip) {
        if (confirm("Add " + mac + " to " + rule_type + "?")) {
            // Get CSRF token from LuCI session
            var token = document.getElementsByName('token')[0]?.value || '';
            
            XHR.post('<%=url('admin/services/remotwrt/api')%>', {
                action: 'add_firewall_rule',
                rule_type: rule_type,
                mac: mac,
                ip: ip,
                token: token
            }, function(x, data) {
                if (data.success) {
                    alert("Device added to " + rule_type);
                    refreshDevices();
                } else {
                    alert("Error: " + (data.error || "Unknown error"));
                }
            });
        }
    }
    
    // Auto-refresh every 30 seconds
    setInterval(refreshDevices, 30000);
    
    // Initial load
    refreshDevices();
</script>

<%+footer%>
