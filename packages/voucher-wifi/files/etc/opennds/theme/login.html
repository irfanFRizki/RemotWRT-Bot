<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login WiFi - RemotWRT</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        select, input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .warning-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            display: none;
        }
        .warning-box p {
            margin: 0;
            color: #856404;
            font-size: 14px;
            line-height: 1.5;
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
        #passwordField {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡 Login WiFi</h1>
        <p class="subtitle">Silakan pilih kategori dan masukkan kode voucher</p>

        <div id="warningBox" class="warning-box">
            <p>⚠️ <strong>Perhatian:</strong> WiFi Pribadi tidak dipakai secara umum. Harap gunakan dengan bijak.</p>
        </div>

        <form action="/opennds_auth/" method="post">
            <input type="hidden" name="fasid" value="<%= fasid %>">
            <input type="hidden" name="origurl" value="<%= origurl %>">
            <input type="hidden" name="redirurl" value="<%= redirurl %>">
            <input type="hidden" name="tok" value="<%= token %>">
            <input type="hidden" name="username" id="username">

            <div class="form-group">
                <label for="category">Kategori Pengguna:</label>
                <select id="category" name="category" onchange="toggleFields()" required>
                    <option value="">-- Pilih Kategori --</option>
                    <option value="keluarga">Keluarga</option>
                    <option value="pengguna_lain">Pengguna Lain</option>
                </select>
            </div>

            <div class="form-group" id="passwordField">
                <label for="voucher">Kode Voucher:</label>
                <input type="text" id="voucher" name="voucher" placeholder="Masukkan kode voucher" autocomplete="off">
            </div>

            <button type="submit" id="submitBtn" disabled>Masuk WiFi</button>
        </form>

        <div class="footer">
            &copy; 2024 RemotWRT Bot. All rights reserved.
        </div>
    </div>

    <script>
        function toggleFields() {
            const category = document.getElementById('category').value;
            const passwordField = document.getElementById('passwordField');
            const warningBox = document.getElementById('warningBox');
            const submitBtn = document.getElementById('submitBtn');
            const voucherInput = document.getElementById('voucher');

            if (category === 'pengguna_lain') {
                warningBox.style.display = 'block';
                passwordField.style.display = 'block';
                voucherInput.required = true;
                voucherInput.value = '';
                voucherInput.focus();
                submitBtn.disabled = true;
                
                // Enable button only when voucher is entered
                voucherInput.addEventListener('input', function() {
                    submitBtn.disabled = this.value.trim() === '';
                });
            } else if (category === 'keluarga') {
                warningBox.style.display = 'none';
                passwordField.style.display = 'block';
                voucherInput.required = true;
                voucherInput.value = '';
                voucherInput.focus();
                submitBtn.disabled = true;
                
                // Enable button only when voucher is entered
                voucherInput.addEventListener('input', function() {
                    submitBtn.disabled = this.value.trim() === '';
                });
            } else {
                warningBox.style.display = 'none';
                passwordField.style.display = 'none';
                voucherInput.value = '';
                voucherInput.required = false;
                submitBtn.disabled = true;
            }
        }

        // Prevent form submission if category not selected, and construct username field
        document.querySelector('form').addEventListener('submit', function(e) {
            const category = document.getElementById('category').value;
            const voucher = document.getElementById('voucher').value;
            if (!category) {
                e.preventDefault();
                alert('Silakan pilih kategori pengguna terlebih dahulu!');
                return;
            }
            // Set the hidden username field to category:voucher format for BinAuth
            document.getElementById('username').value = category + ':' + voucher;
        });
    </script>
</body>
</html>
