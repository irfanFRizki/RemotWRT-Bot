<%+header%>

<div class="cbi-map">
    <h2 name="content">Device History</h2>
    <div class="cbi-map-descr">Historical record of devices that have connected to the network</div>
</fieldset>

<fieldset class="cbi-section">
    <legend>Connection History</legend>
    <table class="cbi-section-table" id="history-table">
        <tr class="cbi-section-table-titles">
            <th class="cbi-section-table-cell">Timestamp</th>
            <th class="cbi-section-table-cell">MAC Address</th>
            <th class="cbi-section-table-cell">IP Address</th>
            <th class="cbi-section-table-cell">Event</th>
        </tr>
        <tr class="cbi-section-table-row" id="loading-row">
            <td colspan="4" style="text-align:center;">Loading history...</td>
        </tr>
    </table>
</fieldset>

<fieldset class="cbi-section">
    <legend>Actions</legend>
    <button class="cbi-button cbi-button-positive" onclick="loadHistory()">Refresh</button>
    <button class="cbi-button cbi-button-negative" onclick="clearHistory()">Clear History</button>
</fieldset>

<script type="text/javascript">
    function loadHistory() {
        XHR.get('<%=url('admin/services/remotwrt/history_data')%>', null, function(x, data) {
            displayHistory(data);
        });
    }
    
    function displayHistory(data) {
        var table = document.getElementById('history-table');
        
        // Clear existing rows except header
        while (table.rows.length > 1) {
            table.deleteRow(1);
        }
        
        if (data && data.length > 0) {
            // Sort by timestamp descending
            data.sort(function(a, b) { return b.timestamp - a.timestamp; });
            
            data.forEach(function(entry) {
                var row = table.insertRow(-1);
                row.className = 'cbi-section-table-row';
                
                var cell_time = row.insertCell(0);
                var date = new Date(entry.timestamp * 1000);
                cell_time.textContent = date.toLocaleString();
                
                var cell_mac = row.insertCell(1);
                cell_mac.textContent = entry.mac || '-';
                
                var cell_ip = row.insertCell(2);
                cell_ip.textContent = entry.ip || '-';
                
                var cell_event = row.insertCell(3);
                cell_event.textContent = entry.event || 'connect';
            });
        } else {
            var row = table.insertRow(-1);
            row.className = 'cbi-section-table-row';
            var cell = row.insertCell(0);
            cell.colSpan = 4;
            cell.textContent = 'No history records found';
            cell.style.textAlign = 'center';
        }
    }
    
    function clearHistory() {
        if (confirm("Are you sure you want to clear all history?")) {
            var token = document.getElementsByName('token')[0]?.value || '';
            XHR.post('<%=url('admin/services/remotwrt/clear_history')%>', { token: token }, function(x, data) {
                if (data && data.success) {
                    alert("History cleared");
                    loadHistory();
                } else {
                    alert("Error clearing history");
                }
            });
        }
    }
    
    // Initial load
    loadHistory();
</script>

<%+footer%>
