<%+header%>

<style>
.remotbot-card {
    background: var(--color-bg-1, #fff);
    border: 1px solid var(--color-border, #dee2e6);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
}
.remotbot-status-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 12px;
    font-weight: bold;
    font-size: 14px;
}
.status-running { background:#d4edda; color:#155724; }
.status-stopped { background:#f8d7da; color:#721c24; }
.status-unknown { background:#fff3cd; color:#856404; }
.remotbot-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 12px;
}
.remotbot-metric {
    background: var(--color-bg-2, #f8f9fa);
    border-radius: 6px;
    padding: 12px;
    text-align: center;
}
.remotbot-metric .label { font-size: 12px; color: #666; margin-bottom: 4px; }
.remotbot-metric .value { font-size: 18px; font-weight: bold; }
.remotbot-btn {
    display: inline-block;
    padding: 8px 18px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    margin: 4px;
    transition: opacity 0.2s;
}
.remotbot-btn:hover { opacity: 0.85; }
.btn-start  { background: #28a745; color: #fff; }
.btn-stop   { background: #dc3545; color: #fff; }
.btn-restart{ background: #fd7e14; color: #fff; }
.btn-deps   { background: #17a2b8; color: #fff; }
.check-icon { font-size: 16px; margin-right: 6px; }
.check-ok   { color: #28a745; }
.check-fail { color: #dc3545; }
#install-log {
    background: #1e1e1e;
    color: #00ff00;
    font-family: monospace;
    font-size: 12px;
    padding: 12px;
    border-radius: 6px;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    display: none;
    margin-top: 10px;
}
</style>

<h2><i class="fas fa-robot"></i> <%:Remot Bot - Dashboard%></h2>

<div class="remotbot-card" id="status-card">
    <h3>🤖 Bot Status</h3>
    <div id="status-content">
        <p>Loading...</p>
    </div>
    <div style="margin-top:14px;">
        <button class="remotbot-btn btn-start"   onclick="botAction('start')">▶ Start</button>
        <button class="remotbot-btn btn-stop"    onclick="botAction('stop')">⏹ Stop</button>
        <button class="remotbot-btn btn-restart" onclick="botAction('restart')">🔄 Restart</button>
        <button class="remotbot-btn btn-deps"    onclick="installDeps()">📦 Install Dependencies</button>
    </div>
    <div id="install-log"></div>
</div>

<div class="remotbot-card">
    <h3>⚙️ Quick Links</h3>
    <p>
        <a href="<%=luci.dispatcher.build_url('admin','services','remotbot','settings')%>">
            ⚙️ Buka Settings untuk mengatur Bot Token dan User ID
        </a>
    </p>
    <p style="font-size:13px;color:#666;">
        ℹ️ Dapatkan Bot Token dari <b>@BotFather</b> di Telegram.<br>
        ℹ️ Dapatkan User ID dari <b>@userinfobot</b> di Telegram.
    </p>
</div>

<script>
var BASE = '<%=luci.dispatcher.build_url("admin","services","remotbot","api")%>';

function fetchStatus() {
    fetch(BASE + '/status')
        .then(r => r.json())
        .then(data => {
            var html = '';

            // Status badge
            var badge = data.running
                ? '<span class="remotbot-status-badge status-running">🟢 RUNNING</span>'
                : '<span class="remotbot-status-badge status-stopped">🔴 STOPPED</span>';
            html += '<div style="margin-bottom:12px">' + badge;
            if (data.pid) html += ' <small>PID: ' + data.pid + '</small>';
            html += '</div>';

            // Checklist
            html += '<div>';
            html += checkItem(data.config_ok,  'Config file (/etc/remotbot/config.json)');
            html += checkItem(data.token_set,  'Bot Token dikonfigurasi');
            html += checkItem(data.users_set,  'Allowed Users dikonfigurasi');
            html += checkItem(data.deps_ok,    'Python dependencies terinstall');
            html += '</div>';

            if (!data.deps_ok) {
                html += '<p style="color:#dc3545;margin-top:10px;">⚠️ Dependencies belum terinstall. Klik <b>Install Dependencies</b> untuk menginstall otomatis.</p>';
            }
            if (!data.token_set || !data.users_set) {
                html += '<p style="color:#fd7e14;margin-top:6px;">⚠️ Konfigurasi belum lengkap. Buka <a href="' + '<%=luci.dispatcher.build_url("admin","services","remotbot","settings")%>' + '">Settings</a>.</p>';
            }

            document.getElementById('status-content').innerHTML = html;
        })
        .catch(function(e) {
            document.getElementById('status-content').innerHTML = '<p style="color:red">Error loading status</p>';
        });
}

function checkItem(ok, label) {
    var icon = ok
        ? '<span class="check-icon check-ok">✅</span>'
        : '<span class="check-icon check-fail">❌</span>';
    return '<div>' + icon + label + '</div>';
}

function botAction(action) {
    fetch(BASE + '/' + action)
        .then(function() {
            setTimeout(fetchStatus, 1500);
        });
}

function installDeps() {
    var log = document.getElementById('install-log');
    log.style.display = 'block';
    log.textContent = 'Installing dependencies...\n';

    fetch(BASE + '/install_deps')
        .then(function() {
            pollLog();
        });
}

function pollLog() {
    var log = document.getElementById('install-log');
    var count = 0;
    var interval = setInterval(function() {
        fetch('/cgi-bin/luci/static/../../../tmp/remotbot-install.log')
            .catch(function() {})
        // Fallback: just show message
        count++;
        if (count >= 3) {
            log.textContent += '\nInstallation running in background.\nCheck /tmp/remotbot-install.log for details.';
            clearInterval(interval);
            setTimeout(fetchStatus, 3000);
        }
    }, 2000);
}

// Auto refresh status setiap 10 detik
fetchStatus();
setInterval(fetchStatus, 10000);
</script>

<%+footer%>
