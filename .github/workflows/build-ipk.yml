name: Build IPK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version & changelog
        id: info
        run: |
          VERSION=$(grep 'VERSION="${1:-' scripts/build-ipk.sh | head -1 | sed 's/.*:-//' | sed 's/}"//')
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          DATE=$(date '+%Y-%m-%d')

          echo "VERSION=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "DATE=$DATE"           >> "$GITHUB_OUTPUT"
          echo "TAG=v${VERSION}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

          # Changelog — pakai delimiter EOF unik (bukan ENDOFCHANGELOG)
          {
            echo "CHANGELOG<<EOF_CHANGELOG_DELIMITER"
            git log --pretty=format:"- %s" -5
            echo ""
            echo "EOF_CHANGELOG_DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Build IPK
        run: |
          chmod +x scripts/build-ipk.sh
          bash scripts/build-ipk.sh ${{ steps.info.outputs.VERSION }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remotbot-ipk-${{ steps.info.outputs.VERSION }}-build${{ github.run_number }}
          path: dist/*.ipk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.info.outputs.TAG }}
          name: "RemotWRT Bot v${{ steps.info.outputs.VERSION }} (${{ steps.info.outputs.DATE }}) Latest"
          files: dist/*.ipk
          body: |
            ## v${{ steps.info.outputs.VERSION }} — ${{ steps.info.outputs.DATE }}

            ### Perubahan
            ${{ steps.info.outputs.CHANGELOG }}

            ### Info Build
            - Commit: `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`
            - Build: `#${{ github.run_number }}`

            ### Cara Install

            ```sh
            cd /tmp

            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.info.outputs.TAG }}/remotbot_${{ steps.info.outputs.VERSION }}-1_aarch64_cortex-a72.ipk
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.info.outputs.TAG }}/luci-app-remotbot_${{ steps.info.outputs.VERSION }}-1_aarch64_cortex-a72.ipk

            opkg remove remotbot luci-app-remotbot 2>/dev/null
            opkg install remotbot_*.ipk --nodeps
            opkg install luci-app-remotbot_*.ipk
            rm -rf /tmp/luci-indexcache /tmp/luci-modulecache/
            ```

            ### Konfigurasi Awal

            ```sh
            uci set remotbot.main.bot_token='TOKEN_DARI_BOTFATHER'
            uci set remotbot.main.allowed_users='USER_ID_TELEGRAM'
            uci set remotbot.main.enabled='1'
            uci commit remotbot
            /etc/init.d/remotbot start
            ```

            > Atau lewat **LuCI → Services → Remot Bot → Settings**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
