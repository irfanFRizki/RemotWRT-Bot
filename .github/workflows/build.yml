name: Build IPK Package

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'luci-app-remotbot/**'
      - 'Makefile'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libncurses5-dev \
            zlib1g-dev \
            gawk \
            git \
            gettext \
            libssl-dev \
            xsltproc \
            rsync \
            wget \
            unzip \
            python3

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'PKG_VERSION:=' Makefile | cut -d= -f2)
          RELEASE=$(grep 'PKG_RELEASE:=' Makefile | cut -d= -f2)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "pkg_name=luci-app-remotbot_${VERSION}-${RELEASE}_all.ipk" >> $GITHUB_OUTPUT

      - name: Build IPK manually (without full OpenWrt SDK)
        run: |
          chmod +x scripts/build-ipk.sh
          bash scripts/build-ipk.sh

      - name: Upload IPK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-remotbot-ipk
          path: dist/*.ipk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }}
          name: RemotWRT Bot v${{ steps.version.outputs.version }} (${{ steps.version.outputs.short_sha }})
          body: |
            ## RemotWRT Bot IPK Package
            
            ### Instalasi
            1. Download file `.ipk` dari Assets di bawah
            2. Upload ke OpenWrt via SCP atau Termux:
               ```bash
               scp luci-app-remotbot_*.ipk root@192.168.1.1:/tmp/
               ssh root@192.168.1.1 "opkg install /tmp/luci-app-remotbot_*.ipk"
               ```
            3. Buka LuCI: **Services → Remot Bot → Settings**
            4. Masukkan **Bot Token** dan **Telegram User ID**
            5. Klik **Start** di Dashboard
            
            ### Perubahan
            - Commit: `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`
          files: dist/*.ipk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
