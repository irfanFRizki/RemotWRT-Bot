name: Build IPK Package

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'luci-app-remotbot/**'
      - 'Makefile'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Ambil semua history untuk changelog

      - name: Set up build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential git wget unzip python3

      - name: Generate version & changelog
        id: version
        run: |
          # в”Ђв”Ђ Hitung versi otomatis dari jumlah commit в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          COMMIT_COUNT=$(git rev-list --count HEAD)
          MAJOR=1
          MINOR=$(( COMMIT_COUNT / 10 ))
          PATCH=$(( COMMIT_COUNT % 10 ))
          AUTO_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          RELEASE=1
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date '+%Y-%m-%d')

          echo "version=${AUTO_VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}"      >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}"  >> $GITHUB_OUTPUT
          echo "date=${DATE}"            >> $GITHUB_OUTPUT
          echo "tag=v${AUTO_VERSION}"    >> $GITHUB_OUTPUT

          # в”Ђв”Ђ Update versi di Makefile в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${AUTO_VERSION}/" Makefile
          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=${RELEASE}/"      Makefile

          # в”Ђв”Ђ Generate changelog dari commit messages в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
          # Ambil commit sejak tag terakhir, atau 20 commit terakhir jika belum ada tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -20)
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- Initial release"
          fi

          # Simpan changelog ke file (hindari masalah multiline di env)
          cat > /tmp/changelog.md <<CHANGELOG
          ## v${AUTO_VERSION} вЂ” ${DATE}

          ### Perubahan
          ${COMMITS}

          ### Info Build
          - Commit: \`${{ github.sha }}\`
          - Branch: \`${{ github.ref_name }}\`
          - Build: \`#${{ github.run_number }}\`

          ### Instalasi
          \`\`\`bash
          scp luci-app-remotbot_*.ipk root@192.168.1.1:/tmp/
          ssh root@192.168.1.1 "opkg install /tmp/luci-app-remotbot_*.ipk"
          \`\`\`
          Lalu buka LuCI в†’ **Services в†’ Remot Bot в†’ Settings**
          CHANGELOG

          echo "changelog_file=/tmp/changelog.md" >> $GITHUB_OUTPUT

      - name: Build IPK
        run: |
          chmod +x scripts/build-ipk.sh
          bash scripts/build-ipk.sh

      - name: Rename IPK with new version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          RELEASE=${{ steps.version.outputs.release }}
          # Rename apapun yang ada di dist/ ke nama versi terbaru
          for f in dist/*.ipk; do
            NEW="dist/luci-app-remotbot_${VERSION}-${RELEASE}_all.ipk"
            [ "$f" != "$NEW" ] && mv "$f" "$NEW" || true
          done
          ls -lh dist/

      - name: Upload IPK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-remotbot-${{ steps.version.outputs.version }}
          path: dist/*.ipk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RemotWRT Bot ${{ steps.version.outputs.tag }} (${{ steps.version.outputs.date }})
          body_path: /tmp/changelog.md
          files: dist/*.ipk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
