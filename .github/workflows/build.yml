name: Build IPK Package
on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'luci-app-remotbot/**'
      - 'Makefile'
      - '.github/workflows/build.yml'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up build environment
        run: sudo apt-get update -qq && sudo apt-get install -y build-essential git wget unzip python3
      - name: Generate version & changelog
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          MAJOR=1; MINOR=$(( COMMIT_COUNT / 10 )); PATCH=$(( COMMIT_COUNT % 10 ))
          AUTO_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date '+%Y-%m-%d')
          echo "version=${AUTO_VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}"  >> $GITHUB_OUTPUT
          echo "date=${DATE}"            >> $GITHUB_OUTPUT
          echo "tag=v${AUTO_VERSION}"    >> $GITHUB_OUTPUT
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${AUTO_VERSION}/" Makefile
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          [ -z "$COMMITS" ] && COMMITS="- Initial release"
          cat > /tmp/changelog.md << CHANGELOG
          ## v${AUTO_VERSION} — ${DATE}
          ### Perubahan
          ${COMMITS}
          ### Info Build
          - Commit: \`${{ github.sha }}\`
          - Branch: \`${{ github.ref_name }}\`
          - Build: \`#${{ github.run_number }}\`
          ### Instalasi
          \`\`\`bash
          scp luci-app-remotbot_*.ipk root@192.168.1.1:/tmp/
          ssh root@192.168.1.1 "opkg install /tmp/luci-app-remotbot_*.ipk"
          \`\`\`
          CHANGELOG
          echo "changelog_file=/tmp/changelog.md" >> $GITHUB_OUTPUT
      - name: Build IPK
        run: chmod +x scripts/build-ipk.sh && bash scripts/build-ipk.sh
      - name: Rename IPK
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for f in dist/*.ipk; do
            NEW="dist/luci-app-remotbot_${VERSION}-1_all.ipk"
            [ "$f" != "$NEW" ] && mv "$f" "$NEW" || true
          done
          ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: luci-app-remotbot-${{ steps.version.outputs.version }}
          path: dist/*.ipk
          retention-days: 30
      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RemotWRT Bot ${{ steps.version.outputs.tag }} (${{ steps.version.outputs.date }})
          body_path: /tmp/changelog.md
          files: dist/*.ipk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
